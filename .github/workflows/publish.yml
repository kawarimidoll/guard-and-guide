name: Publish

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  check:
    name: Check for new commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
      tag: ${{ steps.tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for new commits since last release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LAST_TAG" ] || [ "$(git rev-list "${LAST_TAG}..HEAD" --count)" -gt 0 ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new commits since $LAST_TAG, skipping release"
          fi

      - name: Generate calver tag
        if: steps.check.outputs.has_commits == 'true'
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%y.%-m.%-d)
          COUNT=$(gh release list --json tagName --jq "[.[] | select(.tagName | startswith(\"${DATE}\"))] | length")
          if [ "$COUNT" -eq 0 ]; then
            TAG="$DATE"
          else
            TAG="${DATE}-${COUNT}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

  build-linux:
    name: Build Linux (${{ matrix.target }})
    needs: check
    if: needs.check.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set version
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: perl -pi -e 's/^version = ".*"/version = "'"$TAG"'"/ && $done++ unless $done' Cargo.toml
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/setup-cross-toolchain-action@d62f33b587e73b0004731caebc7d2d46b18a7567 # v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target "$BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/guard-and-guide

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: check
    if: needs.check.outputs.has_commits == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            asset_name: darwin-amd64
          - target: aarch64-apple-darwin
            asset_name: darwin-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set version
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: perl -pi -e 's/^version = ".*"/version = "'"$TAG"'"/ && $done++ unless $done' Cargo.toml
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target "$BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/guard-and-guide

  release:
    name: Create GitHub Release
    needs: [check, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release and upload assets
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: .github/scripts/generate-changelog.sh "" "$TAG" > changelog.md

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Prepare binaries
        run: |
          mkdir dist
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            mv "$dir/guard-and-guide" "dist/$name"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file changelog.md \
            --latest \
            dist/linux-amd64 \
            dist/linux-arm64 \
            dist/darwin-amd64 \
            dist/darwin-arm64
